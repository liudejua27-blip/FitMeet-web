services:
  # PostgreSQL 数据库 - 生产配置
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2621kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  # Redis 缓存 - 生产配置
  redis:
    image: redis:7-alpine
    container_name: fitness-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fitness-network

  # MongoDB - 生产配置
  mongo:
    image: mongo:6
    container_name: fitness-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?MONGO_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: fitness_app
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    command: --wiredTigerCacheSizeGB 1.5
    healthcheck:
      test: mongosh --username ${MONGO_USERNAME:?MONGO_USERNAME is required} --password ${MONGO_PASSWORD:?MONGO_PASSWORD is required} --authenticationDatabase admin --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitness-network

  # Kafka & Zookeeper - 生产配置
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fitness-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - fitness-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fitness-kafka
    restart: always
    depends_on:
      - zookeeper
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fitness-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: fitness-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - fitness-network

  # 后端应用
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    container_name: fitness-backend
    restart: always
    environment:
      NODE_ENV: production
      FITMEET_PROCESS_ROLE: api
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_MIGRATIONS_RUN: "false"
      DB_SYNCHRONIZE: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      ENABLE_SCHEDULER: "false"
      ENABLE_PROFILE_MATCH_AUTOPILOT: "false"
      ENABLE_SOCIAL_AGENT_AUTOPILOT: "false"
      ENABLE_AI_SOCIAL_AUTOPILOT: "false"
      ENABLE_SUBCONSCIOUS_LOOP: "false"
      UPLOAD_DIR: ${UPLOAD_DIR:-/tmp/fitmeet/uploads}
      UPLOAD_TEMP_DIR: ${UPLOAD_TEMP_DIR:-/tmp/fitmeet/uploads/temp}
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - fitness-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # 独立 Subagent Worker - DB 队列消费，隔离 Agent 子任务崩溃与扩缩容
  subagent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    container_name: fitness-subagent-worker
    restart: always
    command: ["node", "dist/agent-gateway/subagent-worker.cli.js"]
    environment:
      NODE_ENV: production
      FITMEET_PROCESS_ROLE: worker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_MIGRATIONS_RUN: "false"
      DB_SYNCHRONIZE: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      ENABLE_SCHEDULER: "true"
      ENABLE_PROFILE_MATCH_AUTOPILOT: ${ENABLE_PROFILE_MATCH_AUTOPILOT:-true}
      ENABLE_SOCIAL_AGENT_AUTOPILOT: ${ENABLE_SOCIAL_AGENT_AUTOPILOT:-true}
      ENABLE_AI_SOCIAL_AUTOPILOT: ${ENABLE_AI_SOCIAL_AUTOPILOT:-true}
      ENABLE_SUBCONSCIOUS_LOOP: ${ENABLE_SUBCONSCIOUS_LOOP:-false}
      FITMEET_SUBAGENT_WORKER_ID: ${FITMEET_SUBAGENT_WORKER_ID:-compose-subagent-worker}
      FITMEET_SUBAGENT_WORKER_MODE: ${FITMEET_SUBAGENT_WORKER_MODE:-db_queue}
      FITMEET_SUBAGENT_WORKER_CONCURRENCY: ${FITMEET_SUBAGENT_WORKER_CONCURRENCY:-2}
      FITMEET_SUBAGENT_WORKER_POLL_MS: ${FITMEET_SUBAGENT_WORKER_POLL_MS:-1000}
      FITMEET_SUBAGENT_WORKER_TIMEOUT_MS: ${FITMEET_SUBAGENT_WORKER_TIMEOUT_MS:-15000}
      FITMEET_SUBAGENT_WORKER_HEARTBEAT_MS: ${FITMEET_SUBAGENT_WORKER_HEARTBEAT_MS:-10000}
      FITMEET_SUBAGENT_WORKER_HEALTH_MAX_AGE_MS: ${FITMEET_SUBAGENT_WORKER_HEALTH_MAX_AGE_MS:-90000}
      FITMEET_SUBAGENT_WORKER_QUEUE: ${FITMEET_SUBAGENT_WORKER_QUEUE:-fitmeet.subagent.life-graph-agent,fitmeet.subagent.social-match-agent,fitmeet.subagent.meet-loop-agent,fitmeet.subagent.math-agent}
      UPLOAD_DIR: ${UPLOAD_DIR:-/tmp/fitmeet/uploads}
      UPLOAD_TEMP_DIR: ${UPLOAD_TEMP_DIR:-/tmp/fitmeet/uploads/temp}
    env_file:
      - ./.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "dist/agent-gateway/subagent-worker-healthcheck.js",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 80s
    networks:
      - fitness-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  mongo_config:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:

networks:
  fitness-network:
    driver: bridge
