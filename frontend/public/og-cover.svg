<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a07;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1108;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84cc16;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="200" fill="#a3e635" opacity="0.04" />
  <circle cx="1100" cy="500" r="150" fill="#84cc16" opacity="0.05" />
  <circle cx="50" cy="550" r="180" fill="#a3e635" opacity="0.03" />

  <!-- Grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="0.5" opacity="0.04" />
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04" />

  <!-- Logo box -->
  <image href="/favicon-512.png" x="80" y="190" width="80" height="80" preserveAspectRatio="xMidYMid meet" filter="url(#glow)" />

  <!-- Brand name -->
  <text x="180" y="248" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#f5ebe0" letter-spacing="-1">Fit</text>
  <text x="284" y="248" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#a3e635" letter-spacing="-1" filter="url(#glow)">Meet</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" fill="#a3a093" letter-spacing="2">运动搭子 · 同城约练 · 专业教练 · AI 匹配</text>

  <!-- Divider -->
  <rect x="80" y="345" width="120" height="3" rx="2" fill="url(#lime)" />

  <!-- Main headline -->
  <text x="80" y="420" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="700" fill="#f5ebe0">找附近的运动伙伴，就用 FitMeet</text>

  <!-- Sub text -->
  <text x="80" y="475" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" fill="#78716c">跑步 · 健身 · 羽毛球 · 徒步 · 瑜伽 · 游泳</text>

  <!-- URL -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="20" fill="#a3e635" opacity="0.8" letter-spacing="1">ourfitmeet.cn</text>

  <!-- Right side icons / decorative sport symbols -->
  <text x="900" y="350" font-size="120" opacity="0.12" fill="#a3e635" font-family="sans-serif">🏃</text>
  <text x="1010" y="280" font-size="90" opacity="0.10" fill="#a3e635" font-family="sans-serif">🏸</text>
  <text x="860" y="490" font-size="80" opacity="0.09" fill="#84cc16" font-family="sans-serif">🏋</text>
</svg>
